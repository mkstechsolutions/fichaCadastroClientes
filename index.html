<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKS Tech Solutions | Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <div class="glass-card">
            <header>
                <h1 class="brand-title">MKS TECH SOLUTIONS</h1>
                <p class="brand-subtitle">CONECTANDO VOCÊ AO FUTURO</p>
            </header>

            <form id="registrationForm">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Nome para consulta" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" name="nascimento" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="contato@exemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="(51) 00000-0000" required>
                </div>

                <div class="input-group">
                    <label for="endereco">Endereço Completo</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro e Cidade" required>
                </div>

                <button type="submit" id="submitBtn">
                    <span id="btnText">ENVIAR CADASTRO</span>
                    <span id="loader" class="loader" style="display: none;"></span>
                </button>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
